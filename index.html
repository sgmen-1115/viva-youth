<style>
:root {
  --primary-color: #003366;
  --accent-color: #f39c12;
  --white: #ffffff;
  --header-h: 56px;
  --tab-h: 64px;
  --ui-glass: rgba(236, 241, 252, 0.92);
  --text-blue: #17325f;

  /* 背景画像のパス（ここだけ後で変更しやすいよう変数化） */
  --hero-image: none;
}

body {
  margin: 0;
  padding-top: var(--header-h);
  color: var(--text-blue);
  font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
  background: linear-gradient(180deg, #7ca2ef 0%, #4f78cc 48%, #2d4ea1 100%);
  background-attachment: fixed;
}

/* 固定ヘッダー */
.fixed-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: var(--header-h);
  box-sizing: border-box;
  z-index: 3000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(25, 42, 92, 0.22);
  backdrop-filter: blur(8px);
  border-bottom: none;
  box-shadow: none;
}

.fixed-header h1 {
  margin: 0;
  font-family: "Cinzel", serif;
  font-size: clamp(0.76rem, 1.7vw, 0.95rem); /* 大きすぎ防止 */
  font-weight: 600;
  letter-spacing: 0.10em;
  line-height: 1;
  color: rgba(245, 249, 255, 0.95);
  text-transform: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.settings-btn {
  color: #2f3f75;
  cursor: pointer;
}

/* スマホでさらに少しだけコンパクト */
@media (max-width: 768px) {
  .fixed-header {
    padding: 0 12px;
  }
  .fixed-header h1 {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
  }
}    

/* タブ */
.tab-menu {
  position: sticky;
  top: var(--header-h);
  z-index: 2500;
  height: var(--tab-h);
  box-sizing: border-box;
  margin: 0 auto;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  width: min(1440px, calc(100% - 24px));
  background: rgba(25, 42, 92, 0.22);
  backdrop-filter: blur(8px);
  border-radius: 0 0 22px 22px;
}

.tab-menu .tab-link,
.tab-menu .tab-btn {
  flex: 1 1 0;
  min-width: 0;
  min-height: 42px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.26);
  background: rgba(255, 255, 255, 0.08);
  color: rgba(245, 249, 255, 0.9);
  font-weight: 700;
  font-size: 0.95rem;
  line-height: 1.1;
  padding: 8px 10px;
}

/* アクティブ */
.tab-menu .tab-link.active,
.tab-menu .tab-btn.active {
  background: rgba(255, 255, 255, 0.24);
  color: #ffffff;
  border-color: rgba(255, 255, 255, 0.42);
}

/* スマホ：5つを1画面に収める */
@media (max-width: 768px) {
  .tab-menu {
    width: 100%;
    padding: 8px 8px;
    gap: 6px;
    border-radius: 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    align-items: stretch;
    overflow: hidden; /* ← 横スクロール禁止 */
    height: auto;
  }

  .tab-menu .tab-link,
  .tab-menu .tab-btn {
    width: 100%;
    min-width: 0;
    min-height: 40px;
    font-size: 12px;
    padding: 7px 4px;
    white-space: normal;
    word-break: keep-all;
    text-align: center;
  }
}

/* コンテンツ */
.tab-content {
  display: none;
  position: relative;
  padding: 20px 16px 40px;
  color: var(--text-blue);
  background: transparent;
  min-height: calc(100vh - (var(--header-h) + var(--tab-h)));
}
.tab-content.active {
  display: block;
}
.tab-content:not(#home)::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 18% 14%, rgba(255,255,255,0.18), rgba(255,255,255,0) 30%),
    radial-gradient(circle at 84% 12%, rgba(255,255,255,0.10), rgba(255,255,255,0) 26%),
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.06) 0,
      rgba(255,255,255,0.06) 1px,
      transparent 1px,
      transparent 26px
    );
  opacity: 0.55;
  pointer-events: none;
}
.tab-content:not(#home) > * {
  position: relative;
  z-index: 1;
}

/* 私の挑戦はPCで横幅を抑えて読みやすくする */

    margin-right: auto;

}

/* ヒーロー背景（画像ベース） */

  padding: 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(25,59,143,0.20) 0%, rgba(25,59,143,0.55) 100%),
    var(--hero-image) center bottom / cover no-repeat;
}
.page-visual::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 16% 20%, rgba(255,255,255,0.22), transparent 25%),
    radial-gradient(circle at 84% 16%, rgba(210,230,255,0.16), transparent 24%);

}

/* ヒーローテキスト */
.hero-container {

}
.hero-content {

.hero-title {

/* ホーム内カード（可読性重視で暗めに） */

}
</style>

<body>

<div class="fixed-header">
  <h1>葛飾総区ユースアクションフェス</h1>
    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
</div>

<div class="tab-menu">
  <button class="tab-link active" onclick="openTab(event, 'home')">ホーム</button>
  <button class="tab-link" onclick="openTab(event, 'mine')">私の挑戦</button>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h3>プロフィール設定</h3>
        <p style="font-size:0.75rem; color:#666;">ユーザー名はPC/スマホ同期用です。重複はできません。</p>
        <input type="text" id="input-username" placeholder="ユーザー名を入力">
        <button id="save-settings-btn" class="oumi-btn" style="margin-top:15px;">設定を保存</button>
        <p onclick="toggleSettings()" style="margin-top:15px; font-size:0.8rem; color:#999; cursor:pointer;">キャンセル</p>
    </div>
</div>


 <div id="home" class="tab-content active">
  <div class="page-visual">
    <div class="hero-container">
      <div class="hero-content">
        <div style="font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 8px; font-weight: bold;">
          葛飾ユース
        </div>
        <h2 class="hero-title">
          <span style="color:#ffffff;">ビバ！葛飾！</span>
        </h2>
      </div>
    </div>

    <div style="padding: 20px; max-width:800px; margin: 0 auto;">
      <div class="card" style="margin-top: -12px; text-align: center;">
        <span style="font-size: 0.8rem; color: rgba(255,255,255,0.75);">葛飾ユースアクションフェスまで</span>
        <div id="timer" style="font-size: 1.8rem; font-weight: bold; color: var(--white);">計算中...</div>
      </div>

      <div class="card notice-board">
        <div class="sub-title" style="margin:0 0 10px 0;">お知らせ</div>
        <div id="notice-list" class="notice-list">
          <p class="notice-empty">現在お知らせはありません。</p>
        </div>
      </div>

      <div class="sub-title">注目動画</div>
      <div class="video-container">
        <iframe src="https://www.youtube.com/embed/WORGpCGs3GY?start=483" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  </div>
</div>

<div id="mine" class="tab-content">

<div class="sub-title">目標設定</div>
<div class="card">
  <label style="font-size: 0.8rem; font-weight: bold; color: #666; display: block; margin-bottom: 8px;">
    目標日
  </label>
  <div class="goal-date-row">
    <input type="date" id="goal-date-input" class="goal-date-input">
    <button class="oumi-btn goal-save-date-btn" onclick="saveGoalDate()">目標日を保存</button>
  </div>
  <p id="goal-date-countdown" class="goal-date-countdown">※目標日を設定してください</p>

  <label style="font-size: 0.8rem; font-weight: bold; color: #666; display: block; margin: 14px 0 8px;">
    目標リスト
  </label>
  <div class="goal-add-row">
    <input type="text" id="goal-item-input" class="goal-textarea" placeholder="例：毎日15分唱題する">
    <button class="oumi-btn goal-add-btn" onclick="addGoalItem()">目標を追加</button>
  </div>

  <div id="goal-items-container" class="goal-items-container"></div>
</div>

    <div class="sub-title">唱題カウンター</div>
    <div class="card" style="text-align: center;">
        <p id="user-display-name" style="font-size:0.8rem; color:var(--primary-color); font-weight:bold;"></p>
        <div style="display: flex; justify-content: space-around; margin-bottom: 20px; background: #f0f7ff; padding: 15px; border-radius: 12px;">
            <div><div style="font-size: 0.7rem;">累計遍数</div><div id="total-count" style="font-weight:bold;">0 遍</div></div>
            <div><div style="font-size: 0.7rem;">累計時間</div><div id="total-time" style="font-weight:bold;">0:00</div></div>
        </div>
        <div id="timer-display" style="font-size: 3rem; font-weight: 300; margin: 10px 0;">00:00:00</div>
        <div id="session-count" style="font-size: 1rem; color: #79bede; margin-bottom: 20px; font-weight: bold;">0 遍</div>

        <button id="startBtn" class="oumi-btn">スタート</button>

        <button id="saveBtn" class="oumi-btn" onclick="saveData()" style="display: none; background-color: #f39c12; margin-top:10px;">記録を保存</button>

        <button id="resetBtn" onclick="resetTimer()" style="margin-top: 15px; background: none; border: none; color: #999; text-decoration: underline; font-size: 0.8rem; cursor: pointer;">タイマーをリセット</button>
    </div>
</div>

<script type="module">
　  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
   import { getDatabase, ref, get, update, onValue, push, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFEUoUyWhz8Qlr2Z261LOlzwe7BIQQTx4",
        authDomain: "sgmen-db.firebaseapp.com",
        databaseURL: "https://sgmen-db-default-rtdb.firebaseio.com",
        projectId: "sgmen-db",
        storageBucket: "sgmen-db.firebasestorage.app",
        messagingSenderId: "968577713228",
        appId: "1:968577713228:web:23eaf381b4be6db1fa60e9"
    };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUsername = localStorage.getItem("sokaUsername") || "";
let userRef = null;
let isAuthReady = false;
let isUserListenerBound = false;

function bindUserDataListener() {
  if (!userRef) return;

 onValue(userRef, (snapshot) => {
  const data = snapshot.val() || { total: 0, totalMs: 0 };
  const displayName = data.username || currentUsername || "匿名";
  document.getElementById("user-display-name").innerText = "利用者: " + displayName;
    document.getElementById("total-count").innerText =
      (data.total || 0).toLocaleString() + " 遍";
    const h = Math.floor((data.totalMs || 0) / 3600000);
    const m = Math.floor(((data.totalMs || 0) % 3600000) / 60000);
    document.getElementById("total-time").innerText =
      h + ":" + m.toString().padStart(2, "0");
  });
}

onAuthStateChanged(auth, async (user) => {
if (!user) {
try {
await signInAnonymously(auth);
} catch (e) {
console.error("匿名認証エラー:", e);
alert("認証に失敗しました。Firebase Authentication の匿名認証を有効化してください。");
}
return;
}
userRef = ref(db, "users/" + user.uid);
isAuthReady = true;
if (!isUserListenerBound) {
bindUserDataListener();
isUserListenerBound = true;
}
});

// --- 唱題タイマーロジック ---
    let startTime, timerInterval, elapsedTime = 0, isRunning = false;
    const startBtn = document.getElementById('startBtn');
    const display = document.getElementById('timer-display');
    const saveBtn = document.getElementById('saveBtn');

    // 1. スタート・ストップ
    startBtn.onclick = () => {
        if (!userRef) { window.toggleSettings(); return; }
        if (!isRunning) {
            isRunning = true; startBtn.innerText = "ストップ";
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime + elapsedTime;
                const hh = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const mm = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const ss = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                display.innerText = `${hh}:${mm}:${ss}`;
                document.getElementById('session-count').innerText = `${Math.floor(diff / 1500)} 遍`;
            }, 100);
            saveBtn.style.display = "none";
        } else {
            isRunning = false; startBtn.innerText = "再開";
            clearInterval(timerInterval);
            elapsedTime += Date.now() - startTime;
            if (elapsedTime >= 1500) saveBtn.style.display = "block"; // 1500ms(1遍)以上で保存可能
        }
    };

    // 2. リセット機能
    window.resetTimer = () => {
        if (isRunning) {
            clearInterval(timerInterval);
            isRunning = false;
        }
        elapsedTime = 0;
        display.innerText = "00:00:00";
        document.getElementById('session-count').innerText = "0 遍";
        startBtn.innerText = "スタート";
        saveBtn.style.display = "none";
    };

    // 3. データの保存（ここが動作していませんでした）
    window.saveData = async () => {
        if (!userRef) return;

        try {
            const sessionCount = Math.floor(elapsedTime / 1500);
            const snapshot = await get(userRef);
            const data = snapshot.val() || { total: 0, totalMs: 0 };

            await update(userRef, {
                total: (data.total || 0) + sessionCount,
                totalMs: (data.totalMs || 0) + elapsedTime
            });

            alert("記録を保存しました！");
            resetTimer(); // 保存後にタイマーをリセット
        } catch (error) {
            console.error("保存エラー:", error);
            alert("保存に失敗しました。ネット接続を確認してください。");
        }
    };

const noticeRef = ref(db, "noticeBoard");
const noticeList = document.getElementById("notice-list");

function formatNoticeTime(ts) {
  const d = new Date(ts || Date.now());
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  const h = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  return y + "/" + m + "/" + day + " " + h + ":" + min;
}

if (noticeList) {
  const q = query(noticeRef, orderByChild("createdAt"), limitToLast(30));
  onValue(q, (snapshot) => {
    const items = [];
    snapshot.forEach((child) => items.push(child.val()));
    items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

    noticeList.innerHTML = "";
    if (!items.length) {
      noticeList.innerHTML = '<p class="notice-empty">現在お知らせはありません。</p>';
      return;

    items.forEach((item) => {
      const row = document.createElement("div");

      const text = document.createElement("div");
      text.className = "notice-text";
      text.textContent = item.text || "";

      row.appendChild(meta);
      row.appendChild(text);
      noticeList.appendChild(row);
    });
  });
}

<script>
  const GOAL_DATE_KEY = "myGoalDate";
  const GOAL_ITEMS_KEY = "myGoalItems";

  function getGoalItems() {
    try {
      const raw = localStorage.getItem(GOAL_ITEMS_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function setGoalItems(items) {
    localStorage.setItem(GOAL_ITEMS_KEY, JSON.stringify(items));
  }

  function updateGoalDateCountdown() {
    const el = document.getElementById("goal-date-countdown");
    const raw = localStorage.getItem(GOAL_DATE_KEY);

    if (!el) return;
    if (!raw) {
      el.textContent = "目標日を設定してください";
      return;
    }

    const today = new Date();
    const target = new Date(raw + "T00:00:00");
    const diffMs = target.getTime() - new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

    if (diffDays > 0) {
      el.textContent = "目標日まであと" + diffDays + "日";
    } else if (diffDays === 0) {
      el.textContent = "目標日は今日です";
    } else {
      el.textContent = "目標日を" + Math.abs(diffDays) + "日過ぎています";
    }
  }

  function saveGoalDate() {
    const input = document.getElementById("goal-date-input");
    if (!input || !input.value) {
      alert("目標日を選択してください");
      return;
    }
    localStorage.setItem(GOAL_DATE_KEY, input.value);
    updateGoalDateCountdown();
  }

  function renderGoalItems() {
    const container = document.getElementById("goal-items-container");
    if (!container) return;

    const items = getGoalItems();
    container.innerHTML = "";

    if (items.length === 0) {
      const empty = document.createElement("p");
      empty.style.margin = "0";
      empty.style.color = "#6e7fa8";
      empty.textContent = "目標を追加してください";
      container.appendChild(empty);
      return;
    }

    items.forEach((item, index) => {
      const row = document.createElement("div");
      row.className = "goal-item-row";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.className = "goal-item-checkbox";
      checkbox.checked = !!item.done;
      checkbox.onchange = () => toggleGoalDone(index, checkbox.checked);

      const text = document.createElement("input");
      text.type = "text";
      text.className = "goal-item-text" + (item.done ? " done" : "");
      text.value = item.text || "";
      text.onchange = () => updateGoalText(index, text.value);

      const del = document.createElement("button");
      del.type = "button";
      del.className = "goal-item-delete";
      del.textContent = "削除";
      del.onclick = () => deleteGoalItem(index);

      row.appendChild(checkbox);
      row.appendChild(text);
      row.appendChild(del);
      container.appendChild(row);
    });
  }

  function addGoalItem() {
    const input = document.getElementById("goal-item-input");
    if (!input) return;

    const value = input.value.trim();
    if (!value) return;

    const items = getGoalItems();
    items.push({ text: value, done: false });
    setGoalItems(items);

    input.value = "";
    renderGoalItems();
  }

  function toggleGoalDone(index, done) {
    const items = getGoalItems();
    if (!items[index]) return;
    items[index].done = done;
    setGoalItems(items);
    renderGoalItems();
  }

  function updateGoalText(index, text) {
    const items = getGoalItems();
    if (!items[index]) return;
    items[index].text = text.trim();
    setGoalItems(items);
  }

  function deleteGoalItem(index) {
    const items = getGoalItems();
    items.splice(index, 1);
    setGoalItems(items);
    renderGoalItems();
  }

  window.saveGoalDate = saveGoalDate;
  window.addGoalItem = addGoalItem;

  const _originalOnload = window.onload;
  window.onload = () => {
    if (typeof _originalOnload === "function") _originalOnload();

    const dateInput = document.getElementById("goal-date-input");
    const savedDate = localStorage.getItem(GOAL_DATE_KEY);
    if (dateInput && savedDate) dateInput.value = savedDate;

    updateGoalDateCountdown();
    renderGoalItems();
  };
</script>
