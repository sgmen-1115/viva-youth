<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>葛飾総区ユースアクションフェスサイト</title>

<meta name="description" content="葛飾ユースの挑戦をサポートするページです。">
<meta property="og:type" content="website">
<meta property="og:title" content="葛飾ユースアクションフェス">
<meta property="og:description" content="葛飾ユースの挑戦をサポートするページです。">
<meta property="og:url" content="https://sgmen-1115.github.io/viva-youth/">
<meta property="og:image" content="https://sgmen-1115.github.io/viva-youth/icon512.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="葛飾ユースアクションフェス">
<meta name="twitter:description" content="葛飾ユースの挑戦をサポートする公式ページです。">
<meta name="twitter:image" content="https://sgmen-1115.github.io/viva-youth/icon512.jpg">

<link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="葛飾ユースアクションフェス">
    <link rel="apple-touch-icon" href="./icon192.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary-color: #8d6a17;
  --accent-color: #f2c55f;
  --white: #ffffff;
  --header-h: 56px;
  --tab-h: 64px;
  --ui-glass: rgba(255, 250, 228, 0.94);
  --text-blue: #5f4917;

  /* 背景画像のパス（ここだけ後で変更しやすいよう変数化） */
  --hero-image: none;
}

body {
  margin: 0;
  padding-top: var(--header-h);
  color: var(--text-blue);
  font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
  background: linear-gradient(180deg, #fff7cf 0%, #ffedb0 48%, #f6de92 100%);
  background-attachment: fixed;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 12% 14%, rgba(255, 230, 172, 0.42) 0 8px, transparent 9px),
    radial-gradient(circle at 88% 18%, rgba(255, 244, 205, 0.35) 0 7px, transparent 8px),
    radial-gradient(circle at 20% 80%, rgba(255, 235, 176, 0.34) 0 9px, transparent 10px),
    radial-gradient(circle at 82% 76%, rgba(255, 219, 149, 0.36) 0 10px, transparent 11px);
  opacity: 0.55;
  z-index: 0;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 25% 30%, rgba(255, 255, 255, 0.20), transparent 35%),
    radial-gradient(circle at 78% 66%, rgba(255, 255, 255, 0.18), transparent 32%);
  z-index: 0;
}

/* 固定ヘッダー */
.fixed-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: var(--header-h);
  box-sizing: border-box;
  z-index: 3000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  background: rgba(179, 145, 48, 0.26);
  backdrop-filter: blur(8px);
  border-bottom: none;
  box-shadow: none;
}

.fixed-header h1 {
  margin: 0;
  font-family: "Cinzel", serif;
  font-size: clamp(0.76rem, 1.7vw, 0.95rem); /* 大きすぎ防止 */
  font-weight: 600;
  letter-spacing: 0.10em;
  line-height: 1;
  color: rgba(99, 72, 18, 0.95);
  text-transform: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* スマホでさらに少しだけコンパクト */
@media (max-width: 768px) {
  .fixed-header {
    padding: 0 12px;
  }
  .fixed-header h1 {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
  }
}    

/* タブ */
.tab-menu {
  position: sticky;
  top: var(--header-h);
  z-index: 2500;
  height: var(--tab-h);
  box-sizing: border-box;
  margin: 0 auto;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  width: min(1440px, calc(100% - 24px));
  background: rgba(179, 145, 48, 0.24);
  backdrop-filter: blur(8px);
  border-radius: 0 0 22px 22px;
}

.tab-menu .tab-link,
.tab-menu .tab-btn {
  flex: 1 1 0;
  min-width: 0;
  min-height: 42px;
  border-radius: 999px;
  border: 1px solid rgba(140, 106, 22, 0.30);
  background: rgba(255, 252, 236, 0.62);
  color: rgba(94, 69, 16, 0.95);
  font-weight: 700;
  font-size: 0.95rem;
  line-height: 1.1;
  padding: 8px 10px;
}

/* アクティブ */
.tab-menu .tab-link.active,
.tab-menu .tab-btn.active {
  background: rgba(247, 208, 118, 0.84);
  color: #5b430f;
  border-color: rgba(141, 107, 21, 0.50);
}

/* スマホ：5つを1画面に収める */
@media (max-width: 768px) {
  .tab-menu {
    width: 100%;
    padding: 8px 8px;
    gap: 6px;
    border-radius: 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    align-items: stretch;
    overflow: hidden; /* ← 横スクロール禁止 */
    height: auto;
  }

  .tab-menu .tab-link,
  .tab-menu .tab-btn {
    width: 100%;
    min-width: 0;
    min-height: 40px;
    font-size: 12px;
    padding: 7px 4px;
    white-space: normal;
    word-break: keep-all;
    text-align: center;
  }
}

/* コンテンツ */
.tab-content {
  display: none;
  position: relative;
  padding: 20px 16px 40px;
  color: var(--text-blue);
  background: transparent;
  min-height: calc(100vh - (var(--header-h) + var(--tab-h)));
}
.tab-content.active {
  display: block;
}
.tab-content:not(#home)::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 18% 14%, rgba(255,255,255,0.18), rgba(255,255,255,0) 30%),
    radial-gradient(circle at 84% 12%, rgba(255,255,255,0.10), rgba(255,255,255,0) 26%),
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.06) 0,
      rgba(255,255,255,0.06) 1px,
      transparent 1px,
      transparent 26px
    );
  opacity: 0.55;
  pointer-events: none;
}
.tab-content:not(#home) > * {
  position: relative;
  z-index: 1;
}

/* 私の挑戦はPCで横幅を抑えて読みやすくする */
@media (min-width: 1024px) {
  #mine {
    max-width: 860px;
    margin-left: auto;
    margin-right: auto;
  }
}

/* ヒーロー背景（画像ベース） */
.page-visual {
  position: relative;
  min-height: calc(100vh - (var(--header-h) + var(--tab-h)));
  margin: 0;
  padding: 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(206,166,69,0.12) 0%, rgba(175,136,47,0.30) 100%),
    var(--hero-image) center bottom / cover no-repeat;
}

/* ホーム背景: 大きな輪が重なるレイヤー */
#home .page-visual {
  background:
    radial-gradient(
      circle at 10% 20%,
      transparent 0 16vmin,
      rgba(255, 246, 205, 0.62) 16vmin 22vmin,
      transparent 22.4vmin
    ),
    radial-gradient(
      circle at 34% 68%,
      transparent 0 20vmin,
      rgba(255, 233, 172, 0.52) 20vmin 27vmin,
      transparent 27.4vmin
    ),
    radial-gradient(
      circle at 78% 24%,
      transparent 0 18vmin,
      rgba(255, 239, 190, 0.56) 18vmin 25vmin,
      transparent 25.5vmin
    ),
    radial-gradient(
      circle at 86% 78%,
      transparent 0 22vmin,
      rgba(255, 226, 153, 0.5) 22vmin 29vmin,
      transparent 29.4vmin
    ),
    linear-gradient(180deg, #fff8d9 0%, #f7df99 52%, #e7c774 100%);
}

#home .page-visual::before {
  background:
    radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.38), transparent 28%),
    radial-gradient(circle at 82% 74%, rgba(255, 255, 255, 0.24), transparent 30%),
    linear-gradient(145deg, rgba(255, 252, 237, 0.2), rgba(214, 171, 78, 0.16));
}

@media (max-width: 768px) {
  #home .page-visual {
    background:
      radial-gradient(
        circle at 8% 16%,
        transparent 0 22vmin,
        rgba(255, 246, 205, 0.58) 22vmin 28vmin,
        transparent 28.5vmin
      ),
      radial-gradient(
        circle at 34% 64%,
        transparent 0 24vmin,
        rgba(255, 233, 172, 0.48) 24vmin 31vmin,
        transparent 31.4vmin
      ),
      radial-gradient(
        circle at 88% 20%,
        transparent 0 20vmin,
        rgba(255, 239, 190, 0.52) 20vmin 27vmin,
        transparent 27.5vmin
      ),
      radial-gradient(
        circle at 84% 80%,
        transparent 0 24vmin,
        rgba(255, 226, 153, 0.46) 24vmin 31vmin,
        transparent 31.5vmin
      ),
      linear-gradient(180deg, #fff8d9 0%, #f7df99 52%, #e7c774 100%);
  }
}

.page-visual::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 16% 20%, rgba(255,250,225,0.36), transparent 25%),
    radial-gradient(circle at 84% 16%, rgba(255,234,176,0.22), transparent 24%);
  pointer-events: none;
}

/* ヒーローテキスト */
.hero-container {
  position: relative;
  min-height: 20vh;
}
.hero-content {
  position: absolute;
  top: 26px;
  left: 0;
  right: 0;
  z-index: 20;
  padding: 0 20px;
  max-width: 980px;
  margin: 0 auto;
}
.hero-title {
  margin: 0;
  font-size: clamp(1.8rem, 3.7vw, 3rem);
  line-height: 1.35;
  letter-spacing: 0.03em;
  color: #fffdf3;
  font-weight: 500;
  text-shadow: 0 2px 10px rgba(113, 82, 16, 0.28), 0 0 20px rgba(255, 225, 147, 0.28);
}
.hero-title::after {
  content: "";
  display: block;
  width: clamp(120px, 20vw, 220px);
  height: 2px;
  margin-top: 16px;
  background: linear-gradient(90deg, rgba(255,255,255,0.85), rgba(255,255,255,0.08));
  border-radius: 999px;
}
.hero-content > div:first-child {
  color: #fff1c8 !important;
  letter-spacing: 0.22em !important;
  font-weight: 700 !important;
  opacity: 0.92;
}

/* 旧イラスト要素は完全停止 */
.hero-illustration,
.city-silhouette,
.hero-horizon,
.hero-city-back,
.hero-city-front,
.hero-light-trail {
  display: none !important;
}

/* カード */
.card {
  background: rgba(255, 251, 234, 0.90);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.3);
  margin-bottom: 20px;
  color: #5f4917;
}
.card p,
.card strong,
.card div {
  color: inherit;
}

/* ホーム内カード（可読性重視で暗めに） */
#home .card {
  background: linear-gradient(180deg, rgba(173,132,38,0.64), rgba(144,106,26,0.58)) !important;
  border: 1px solid rgba(255,240,189,0.36) !important;
  box-shadow: 0 10px 30px rgba(105,76,18,0.24) !important;
  color: #fffdf4 !important;
  margin-top: -12px !important;
  position: relative;
  z-index: 8;
}
#home .card p,
#home .card strong,
#home .card div,
#home .notice-meta,
#home .notice-text,
#home .notice-empty {
  color: #fff !important;
}
#home .notice-item {
  background: rgba(255, 246, 211, 0.14) !important;
  border: 1px solid rgba(255, 243, 201, 0.34) !important;
}

/* サブUI */
.sub-title {
  display: inline-block;
  background-color: var(--primary-color);
  color: var(--white);
  padding: 6px 20px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: bold;
  margin: 15px 0 10px 0;
}
.video-container {
  position: relative;
  padding-bottom: 56.25%;
  margin: 20px 0;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.video-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.home-photo-wrap {
  margin: 0 auto 14px;
  max-width: 760px;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 10px 28px rgba(130, 95, 20, 0.22);
  border: 1px solid rgba(255, 255, 255, 0.42);
  background: rgba(255, 255, 255, 0.14);
}

.home-photo {
  width: 100%;
  display: block;
  aspect-ratio: 16 / 9;
  object-fit: cover;
}
.oumi-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--primary-color);
  color: white;
  padding: 15px;
  border-radius: 50px;
  font-weight: bold;
  border: none;
  cursor: pointer;
  width: 100%;
}
.goal-textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-family: inherit;
  font-size: 0.95rem;
  box-sizing: border-box;
  margin-bottom: 10px;
}

#username-register-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 4000;
  background: rgba(0, 0, 0, 0.55);
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.username-register-card {
  width: min(420px, 100%);
  background: #ffffff;
  border-radius: 16px;
  padding: 18px;
  box-sizing: border-box;
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
}

.username-register-title {
  margin: 0 0 10px;
  color: #17325f;
  font-size: 1.05rem;
}

.username-register-help {
  margin: 0 0 12px;
  color: #5f6f95;
  font-size: 0.88rem;
  line-height: 1.5;
}

.username-register-input {
  width: 100%;
  padding: 11px 12px;
  border-radius: 10px;
  border: 1px solid #cfd8ec;
  font-size: 0.95rem;
  box-sizing: border-box;
  margin-bottom: 10px;
}

.username-register-error {
  min-height: 1.2em;
  margin: 0 0 10px;
  color: #b42318;
  font-size: 0.82rem;
}

#app-toast {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%) translateY(12px);
  background: rgba(137, 101, 20, 0.92);
  color: #ffffff;
  padding: 10px 14px;
  border-radius: 999px;
  font-size: 0.9rem;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 5000;
}

#app-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.notice-board {
  margin-top: 12px;
}
.notice-list {
  display: grid;
  gap: 8px;
  max-height: 260px;
  overflow-y: auto;
}
.notice-item {
  border-radius: 10px;
  padding: 10px 12px;
}
.notice-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  margin-bottom: 4px;
}
.notice-text {
  line-height: 1.45;
  word-break: break-word;
}
.notice-empty {
  margin: 0;
}
.goal-date-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.goal-date-input {
  flex: 1;
  min-width: 0;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #d7dbe8;
  font-family: inherit;
  font-size: 0.95rem;
  box-sizing: border-box;
}

.goal-save-date-btn,
.goal-add-btn {
  width: auto;
  min-width: 110px;
  padding: 10px 14px;
}

.goal-date-countdown {
  margin: 10px 0 0;
  font-size: 0.9rem;
  font-weight: bold;
  color: #7c5d16;
}

.goal-add-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.goal-items-container {
  margin-top: 10px;
  display: grid;
  gap: 8px;
}

.goal-item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255, 248, 220, 0.82);
  border: 1px solid #f2dfa2;
  border-radius: 10px;
  padding: 8px;
}

.goal-item-checkbox {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.goal-item-text {
  flex: 1;
  min-width: 0;
  border: 1px solid #d7dbe8;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 0.9rem;
  font-family: inherit;
}

.goal-item-text.done {
  text-decoration: line-through;
  opacity: 0.65;
}

.goal-item-delete {
  border: none;
  background: transparent;
  color: #9b8040;
  font-size: 0.85rem;
  cursor: pointer;
}

@media (max-width: 768px) {
  .goal-date-row,
  .goal-add-row {
    flex-direction: column;
    align-items: stretch;
  }

  .goal-save-date-btn,
  .goal-add-btn {
    width: 100%;
  }
}

.schedule-form-grid {
display: grid;
gap: 8px;
}

.schedule-form-grid input,
.schedule-form-grid textarea {
width: 100%;
box-sizing: border-box;
border: 1px solid #d7dbe8;
border-radius: 10px;
padding: 10px 12px;
font-family: inherit;
font-size: 0.95rem;
}

.schedule-form-grid textarea {
min-height: 84px;
resize: vertical;
}

.schedule-item {
border: 1px solid rgba(255,255,255,0.2);
border-radius: 10px;
padding: 10px 12px;
margin-bottom: 8px;
background: rgba(255,255,255,0.08);
}

.schedule-item-title {
font-weight: 700;
margin-bottom: 4px;
}

.schedule-item-meta {
font-size: 0.85rem;
color: #d9e8ff;
margin-bottom: 6px;
}

.schedule-actions {
display: flex;
gap: 8px;
flex-wrap: wrap;
margin-top: 8px;
}

.schedule-mini-btn {
border: 1px solid rgba(255,255,255,0.3);
border-radius: 8px;
background: rgba(255,255,255,0.12);
color: #fff;
padding: 6px 10px;
cursor: pointer;
font-size: 0.8rem;
}
</style>
</head>
<body>

<div class="fixed-header">
  <h1>葛飾総区ユースアクションフェス</h1>
</div>

<div class="tab-menu">
  <button class="tab-link active" onclick="openTab(event, 'home')">ホーム</button>
  <button class="tab-link" onclick="openTab(event, 'mine')">私の挑戦</button>
</div>

<div id="username-register-modal" aria-hidden="true">
  <div class="username-register-card">
    <h3 class="username-register-title">ユーザー名登録</h3>
    <p id="username-register-help" class="username-register-help">ユーザー名を登録してください（2文字以上）</p>
    <input id="username-register-input" class="username-register-input" type="text" maxlength="30" placeholder="ユーザー名を入力">
    <p id="username-register-error" class="username-register-error"></p>
    <button id="username-register-submit" class="oumi-btn">登録してはじめる</button>
  </div>
</div>

<div id="app-toast" aria-live="polite" aria-atomic="true"></div>

 <div id="home" class="tab-content active">
  <div class="page-visual">
    <div class="hero-container">
      <div class="hero-content">
        <div id="hero-user-welcome" style="font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 8px; font-weight: bold;">
          ようこそ！
        </div>
        <h2 class="hero-title">
          <span style="color:#ffffff;">ビバ！葛飾！</span>
        </h2>
      </div>
    </div>

    <div style="padding: 20px; max-width:800px; margin: 0 auto;">
      <div class="home-photo-wrap">
        <img src="./home.jpg" alt="葛飾ユースアクションフェス" class="home-photo">
      </div>
      <div class="card" style="margin-top: -12px; text-align: center;">
        <span style="font-size: 0.8rem; color: rgba(255,255,255,0.75);">葛飾ユースアクションフェスまで</span>
        <div id="timer" style="font-size: 1.8rem; font-weight: bold; color: var(--white);">計算中...</div>
      </div>

      <div class="card notice-board">
        <div class="sub-title" style="margin:0 0 10px 0;">お知らせ</div>
        <div id="notice-list" class="notice-list">
          <p class="notice-empty">現在お知らせはありません。</p>
        </div>
      </div>

      <div class="sub-title">注目動画</div>
      <div class="video-container">
        <iframe src="https://www.youtube.com/embed/WORGpCGs3GY?start=483" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  </div>

const app = initializeApp(firebaseConfig);

function showAppToast(message, durationMs = 1800) {
  const el = document.getElementById("app-toast");
  if (!el) return;
  el.textContent = message || "";
  el.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.remove("show");
  }, durationMs);
}

function usernameClaimKey(name) {
  return encodeURIComponent((name || "").trim().toLowerCase());
}

function askUsernameWithModal(defaultValue, helpText, errorText) {
  return new Promise((resolve) => {
    const modal = document.getElementById("username-register-modal");
    const input = document.getElementById("username-register-input");
    const submit = document.getElementById("username-register-submit");
    const help = document.getElementById("username-register-help");
    const error = document.getElementById("username-register-error");

    help.textContent = helpText || "ユーザー名を登録してください（2文字以上）";
    error.textContent = errorText || "";
    input.value = defaultValue || "";
    modal.style.display = "flex";
    modal.setAttribute("aria-hidden", "false");

    const finish = () => {
      const value = (input.value || "").trim();
      submit.onclick = null;
      input.onkeydown = null;
      modal.style.display = "none";
      modal.setAttribute("aria-hidden", "true");
      resolve(value);
    };

    submit.onclick = finish;
    input.onkeydown = (ev) => {
      if (ev.key === "Enter") {
        ev.preventDefault();
        finish();
      }
    };

    setTimeout(() => input.focus(), 0);
  });
}

async function ensureUsernameRegistration(uid) {
  let helpText = "ユーザー名を登録してください（2文字以上）";
  let errorText = "";

  while (true) {
    const saved = (localStorage.getItem("sokaUsername") || "").trim();
    let candidate = saved;

    if (!candidate) {
      candidate = await askUsernameWithModal("", helpText, errorText);
    }

    if (!candidate) {
      helpText = "ユーザー名を登録してください（2文字以上）";
      errorText = "ユーザー名は必須です。";
      continue;
    }
    if (candidate.length < 2) {
      localStorage.removeItem("sokaUsername");
      helpText = "ユーザー名を登録してください（2文字以上）";
      errorText = "ユーザー名は2文字以上で入力してください。";
      continue;
    }

    const key = usernameClaimKey(candidate);
    const claimRef = ref(db, "usernameClaims/" + key);
    const tx = await runTransaction(claimRef, (current) => {
      if (current === null || current === uid) return uid;
      return;
    });

    if (!tx.committed) {
      localStorage.removeItem("sokaUsername");
      helpText = "別のユーザー名を入力してください。";
      errorText = "そのユーザー名はすでに使用されています。";
      continue;
    }

    localStorage.setItem("sokaUsername", candidate);
    await update(ref(db, "users/" + uid), {
      username: candidate,
      usernameKey: key,
      updatedAt: Date.now()
    });

    helpText = "ユーザー名を登録してください（2文字以上）";
    errorText = "";
    return candidate;
  }
}

 onValue(userRef, (snapshot) => {

      h + ":" + m.toString().padStart(2, "0");
  });
}

if (!user) {
try {
await signInAnonymously(auth);

alert("認証に失敗しました。Firebase Authentication の匿名認証を有効化してください。");

}

currentUsername = await ensureUsernameRegistration(user.uid);

isUserListenerBound = true;

    // --- 唱題カウンター ---
const CHANT_MS_PER_COUNT = 1200;

// --- 唱題タイマーロジック ---
    let startTime, timerInterval, elapsedTime = 0, isRunning = false;
    const startBtn = document.getElementById('startBtn');
    const display = document.getElementById('timer-display');
    const saveBtn = document.getElementById('saveBtn');

    // 1. スタート・ストップ
    startBtn.onclick = () => {
      if (!userRef) { alert("ユーザー名登録の初期化中です。少し待ってください。"); return; }
        if (!isRunning) {
            isRunning = true; startBtn.innerText = "ストップ";
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime + elapsedTime;
                const hh = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const mm = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const ss = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                display.innerText = `${hh}:${mm}:${ss}`;
                document.getElementById('session-count').innerText = `${Math.floor(diff / CHANT_MS_PER_COUNT)} 遍`;
            }, 100);
            saveBtn.style.display = "none";
        } else {
            isRunning = false; startBtn.innerText = "再開";
            clearInterval(timerInterval);
            elapsedTime += Date.now() - startTime;
              if (elapsedTime >= CHANT_MS_PER_COUNT) saveBtn.style.display = "block";
        }
    };

    // 2. リセット機能
    window.resetTimer = () => {
        if (isRunning) {
            clearInterval(timerInterval);
            isRunning = false;
        }
        elapsedTime = 0;
        display.innerText = "00:00:00";
        document.getElementById('session-count').innerText = "0 遍";
        startBtn.innerText = "スタート";
        saveBtn.style.display = "none";
    };

    // 3. データの保存（ここが動作していませんでした）
    window.saveData = async () => {
        if (!userRef) return;

        try {
        const sessionCount = Math.floor(elapsedTime / CHANT_MS_PER_COUNT);
            const snapshot = await get(userRef);
            const data = snapshot.val() || { total: 0, totalMs: 0 };

            await update(userRef, {
                total: (data.total || 0) + sessionCount,
                totalMs: (data.totalMs || 0) + elapsedTime
            });

          showAppToast("保存しました");
            resetTimer(); // 保存後にタイマーをリセット
        } catch (error) {
            console.error("保存エラー:", error);
            alert("保存に失敗しました。ネット接続を確認してください。");

        const d = Math.floor(diff / (1000*60*60*24));
        const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

<script>
  const GOAL_DATE_KEY_PREFIX = "myGoalDate:";
  const GOAL_ITEMS_KEY_PREFIX = "myGoalItems:";

  function goalStorageSuffix() {
    const name = (localStorage.getItem("sokaUsername") || "guest").trim().toLowerCase();
    return encodeURIComponent(name || "guest");
  }

  function goalDateKey() {
    return GOAL_DATE_KEY_PREFIX + goalStorageSuffix();
  }

  function goalItemsKey() {
    return GOAL_ITEMS_KEY_PREFIX + goalStorageSuffix();
  }

  function getGoalItems() {
    try {
      const raw = localStorage.getItem(goalItemsKey());
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function setGoalItems(items) {
    localStorage.setItem(goalItemsKey(), JSON.stringify(items));
  }

  function updateGoalDateCountdown() {
    const el = document.getElementById("goal-date-countdown");
    const raw = localStorage.getItem(goalDateKey());

    if (!el) return;
    if (!raw) {
      el.textContent = "目標日を設定してください";
      return;
    }

    const today = new Date();
    const target = new Date(raw + "T00:00:00");
    const diffMs = target.getTime() - new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

    if (diffDays > 0) {
      el.textContent = "目標日まであと" + diffDays + "日";
    } else if (diffDays === 0) {
      el.textContent = "目標日は今日です";
    } else {
      el.textContent = "目標日を" + Math.abs(diffDays) + "日過ぎています";
    }
  }

  function saveGoalDate() {
    const input = document.getElementById("goal-date-input");
    if (!input || !input.value) {
      alert("目標日を選択してください");
      return;
    }
    localStorage.setItem(goalDateKey(), input.value);
    updateGoalDateCountdown();
  }

  function renderGoalItems() {
    const container = document.getElementById("goal-items-container");
    if (!container) return;

    const items = getGoalItems();
    container.innerHTML = "";

    if (items.length === 0) {
      const empty = document.createElement("p");
      empty.style.margin = "0";
      empty.style.color = "#6e7fa8";
      empty.textContent = "目標を追加してください";
      container.appendChild(empty);
      return;
    }

    items.forEach((item, index) => {
      const row = document.createElement("div");
      row.className = "goal-item-row";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.className = "goal-item-checkbox";
      checkbox.checked = !!item.done;
      checkbox.onchange = () => toggleGoalDone(index, checkbox.checked);

      const text = document.createElement("input");
      text.type = "text";
      text.className = "goal-item-text" + (item.done ? " done" : "");
      text.value = item.text || "";
      text.onchange = () => updateGoalText(index, text.value);

      const del = document.createElement("button");
      del.type = "button";
      del.className = "goal-item-delete";
      del.textContent = "削除";
      del.onclick = () => deleteGoalItem(index);

      row.appendChild(checkbox);
      row.appendChild(text);
      row.appendChild(del);
      container.appendChild(row);
    });
  }

  function addGoalItem() {
    const input = document.getElementById("goal-item-input");
    if (!input) return;

    const value = input.value.trim();
    if (!value) return;

    const items = getGoalItems();
    items.push({ text: value, done: false });
    setGoalItems(items);

    input.value = "";
    renderGoalItems();
  }

  function toggleGoalDone(index, done) {
    const items = getGoalItems();
    if (!items[index]) return;
    items[index].done = done;
    setGoalItems(items);
    renderGoalItems();
  }

  function updateGoalText(index, text) {
    const items = getGoalItems();
    if (!items[index]) return;
    items[index].text = text.trim();
    setGoalItems(items);
  }

  function deleteGoalItem(index) {
    const items = getGoalItems();
    items.splice(index, 1);
    setGoalItems(items);
    renderGoalItems();
  }

  window.saveGoalDate = saveGoalDate;
  window.addGoalItem = addGoalItem;
  window.refreshGoalView = () => {
    const dateInput = document.getElementById("goal-date-input");
    const savedDate = localStorage.getItem(goalDateKey());
    if (dateInput) dateInput.value = savedDate || "";
    updateGoalDateCountdown();
    renderGoalItems();
  };

  const _originalOnload = window.onload;
  window.onload = () => {
    if (typeof _originalOnload === "function") _originalOnload();
    window.refreshGoalView();
  };
</script>
